name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    # Next.js não toca no banco durante o build (todas as páginas autenticadas
    # são renderizadas dinamicamente via cookies) — os valores abaixo são
    # dummies só pra satisfazer validação de env, não credenciais reais.
    env:
      DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
      AUTH_SECRET: ci-dummy-secret-not-for-production-use
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-dummy-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: web
    # Sem E2E_TENANT_EMAIL/PASSWORD ou E2E_SUPER_ADMIN_EMAIL/PASSWORD, os specs
    # que fazem login de verdade ficam pulados automaticamente (test.skip em
    # e2e/auth.spec.ts) — só os smoke tests de redirecionamento rodam, e esses
    # não tocam no banco.
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/web
    env:
      DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
      AUTH_SECRET: ci-dummy-secret-not-for-production-use
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-dummy-key
      E2E_TENANT_EMAIL: ${{ secrets.E2E_TENANT_EMAIL }}
      E2E_TENANT_PASSWORD: ${{ secrets.E2E_TENANT_PASSWORD }}
      E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
      E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e
