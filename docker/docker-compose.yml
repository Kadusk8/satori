# Serviço backend (webhook + IA + cron), pra deploy no Portainer.
# O app Next.js roda separadamente no Vercel — ver docs/ARCHITECTURE.md.
services:
  backend:
    build:
      context: ../services/backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ../services/backend/.env
